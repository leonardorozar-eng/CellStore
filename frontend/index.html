<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellStore - Teste Frontend</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-5xl mx-auto p-8">
        <h1 class="text-4xl font-bold mb-8">CellStore - Teste da API</h1>

        <!-- Formulário de Cadastro -->
        <div class="bg-zinc-900 p-6 rounded-2xl mb-10">
            <h2 class="text-2xl font-semibold mb-4">Cadastrar Novo Celular</h2>
            <form id="formCelular" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="marca" placeholder="Marca" class="bg-zinc-800 p-3 rounded-xl" required>
                <input type="text" id="modelo" placeholder="Modelo" class="bg-zinc-800 p-3 rounded-xl" required>
                <input type="number" id="preco" placeholder="Preço" step="0.01" class="bg-zinc-800 p-3 rounded-xl" required>
                <input type="number" id="armazenamento" placeholder="Armazenamento (GB)" class="bg-zinc-800 p-3 rounded-xl" required>
                <input type="text" id="cor" placeholder="Cor" class="bg-zinc-800 p-3 rounded-xl" required>
                <input type="number" id="estoque" placeholder="Estoque" class="bg-zinc-800 p-3 rounded-xl" required>
                <input type="text" id="imagem_url" placeholder="URL da Imagem (opcional)" class="bg-zinc-800 p-3 rounded-xl md:col-span-2">
                
                <button type="submit" 
                        class="md:col-span-2 bg-emerald-600 hover:bg-emerald-700 transition p-3 rounded-2xl font-semibold">
                    Cadastrar Celular
                </button>
            </form>
        </div>

        <!-- Lista de Celulares -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold">Celulares Cadastrados</h2>
                <button onclick="carregarCelulares()" 
                        class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm">
                    Atualizar Lista
                </button>
            </div>

            <div id="listaCelulares" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Celulares serão carregados aqui via JavaScript -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        // Carregar celulares
        async function carregarCelulares() {
            const container = document.getElementById('listaCelulares');
            container.innerHTML = '<p class="text-zinc-400">Carregando...</p>';

            try {
                const res = await fetch(`${API_URL}/celulares`);
                const celulares = await res.json();

                container.innerHTML = '';

                if (celulares.length === 0) {
                    container.innerHTML = '<p class="text-zinc-400">Nenhum celular cadastrado ainda.</p>';
                    return;
                }

                celulares.forEach(cel => {
                    const card = document.createElement('div');
                    card.className = 'bg-zinc-900 p-5 rounded-2xl border border-zinc-800';
                    card.innerHTML = `
                        <div class="font-semibold text-lg">${cel.marca} ${cel.modelo}</div>
                        <div class="text-emerald-400 text-xl font-bold mt-1">R$ ${parseFloat(cel.preco).toFixed(2)}</div>
                        <div class="text-sm text-zinc-400 mt-2">
                            ${cel.armazenamento}GB • ${cel.cor} • Estoque: ${cel.estoque}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = '<p class="text-red-400">Erro ao carregar celulares.</p>';
            }
        }

        // Cadastrar novo celular
        document.getElementById('formCelular').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dados = {
                marca: document.getElementById('marca').value,
                modelo: document.getElementById('modelo').value,
                preco: parseFloat(document.getElementById('preco').value),
                armazenamento: parseInt(document.getElementById('armazenamento').value),
                cor: document.getElementById('cor').value,
                estoque: parseInt(document.getElementById('estoque').value),
                imagem_url: document.getElementById('imagem_url').value || null
            };

            try {
                const res = await fetch(`${API_URL}/celulares`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (res.ok) {
                    alert('Celular cadastrado com sucesso!');
                    document.getElementById('formCelular').reset();
                    carregarCelulares();
                } else {
                    alert('Erro ao cadastrar celular.');
                }
            } catch (error) {
                alert('Erro de conexão com a API.');
            }
        });

        // Carregar lista ao abrir a página
        window.onload = () => {
            carregarCelulares();
        };
    </script>
</body>
</html>
